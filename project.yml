name: Zvec-Database
options:
  bundleIdPrefix: com.zvec.database
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: Zvec-Database
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_APP_SANDBOX: NO

targets:
  Zvec-Database:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.zvec.database.Zvec-Database
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_PREVIEWS: YES
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Zvec-Database
        CFBundleDisplayName: Zvec Database
        CFBundleIdentifier: com.zvec.database.Zvec-Database
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: Zvec-Database
        CFBundleIconFile: AppIcon
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSApplicationCategoryType: public.app-category.productivity
